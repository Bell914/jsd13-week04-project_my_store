<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunder Wizard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>Thunder Wizard</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#wands">Wands</a></li>
                <li><a href="#books">Books</a></li>
                <li><a href="#robes">Robes</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Filter & Sort Controls -->
        <section class="controls">
            <!-- Filter Bar -->
            <div class="filter-bar">
                <h3>Filter By:</h3>
                
                <div class="filter-group">
                    <label for="filter-price">Price:</label>
                    <select id="filter-price" name="price">
                        <option value="all">All Prices</option>
                        <option value="under-50">Under 50 Gold</option>
                        <option value="50-100">50 - 100 Gold</option>
                        <option value="over-100">Over 100 Gold</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-material">Material:</label>
                    <select id="filter-material" name="material">
                        <option value="all">All Materials</option>
                        <option value="elder">Elder Wood</option>
                        <option value="oak">Oak</option>
                        <option value="phoenix-feather">Phoenix Feather</option>
                        <option value="dragon-heartstring">Dragon Heartstring</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-type">Wand Type:</label>
                    <select id="filter-type" name="type">
                        <option value="all">All Types</option>
                        <option value="combat">Combat</option>
                        <option value="defense">Defense</option>
                        <option value="utility">Utility</option>
                        <option value="healing">Healing</option>
                    </select>
                </div>
            </div>

            <!-- Sort Bar -->
            <div class="sort-bar">
                <div class="sort-group">
                    <label for="sort-by">Sort By:</label>
                    <select id="sort-by" name="sort">
                        <option value="popularity">Popularity</option>
                        <option value="price-low-high">Price: Low to High</option>
                        <option value="price-high-low">Price: High to Low</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Product Grid Section -->
        <section class="products-grid">
            <h2>Featured Products</h2>
            
            <div class="products-container">
                <article class="product-card">
                    <img src="https://via.placeholder.com/300" alt="Elder Wand of Thunder">
                    <h3 class="product-title">Elder Wand of Thunder</h3>
                    <p class="product-price">120 Gold</p>
                    <button type="button" class="add-to-cart-btn">Add to Cart</button>
                </article>

                <article class="product-card">
                    <img src="https://via.placeholder.com/300" alt="Spellbook of Lightning Storms">
                    <h3 class="product-title">Spellbook of Lightning Storms</h3>
                    <p class="product-price">85 Gold</p>
                    <button type="button" class="add-to-cart-btn">Add to Cart</button>
                </article>

                <article class="product-card">
                    <img src="https://via.placeholder.com/300" alt="Archmage Celestial Robe">
                    <h3 class="product-title">Archmage Celestial Robe</h3>
                    <p class="product-price">150 Gold</p>
                    <button type="button" class="add-to-cart-btn">Add to Cart</button>
                </article>

                <article class="product-card">
                    <img src="https://via.placeholder.com/300" alt="Dragon Core Combat Wand">
                    <h3 class="product-title">Dragon Core Combat Wand</h3>
                    <p class="product-price">95 Gold</p>
                    <button type="button" class="add-to-cart-btn">Add to Cart</button>
                </article>

                <article class="product-card">
                    <img src="https://via.placeholder.com/300" alt="Grimoire of Ancient Spells">
                    <h3 class="product-title">Grimoire of Ancient Spells</h3>
                    <p class="product-price">60 Gold</p>
                    <button type="button" class="add-to-cart-btn">Add to Cart</button>
                </article>

                <article class="product-card">
                    <img src="https://via.placeholder.com/300" alt="Shadow Weaver Cloak">
                    <h3 class="product-title">Shadow Weaver Cloak</h3>
                    <p class="product-price">110 Gold</p>
                    <button type="button" class="add-to-cart-btn">Add to Cart</button>
                </article>
            </div>
        </section>
    </main>
</body>
</html>
